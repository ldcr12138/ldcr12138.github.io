<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Academic Webpage" />
    <meta name="author" content="Feng Gu" />
    <title id="title">Feng Gu's Homepage</title>

    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
    <link rel="preload" href="static/assets/img/background.jpg" as="image" />
    <script>
        (() => {
            try {
                const storedTheme = localStorage.getItem('theme');
                const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.dataset.theme = storedTheme || (prefersDark ? 'dark' : 'light');
            } catch {
                document.documentElement.dataset.theme = 'light';
            }
        })();
    </script>
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <script type="text/javascript" src="static/js/marked.min.js" defer></script>
    <script type="text/javascript" src="static/js/scripts.js" defer></script>
</head>

<body id="page-top">
    <div class="cursor-field" id="cursor-field" aria-hidden="true"></div>

    <div class="site-progress" aria-hidden="true">
        <span id="scroll-progress"></span>
    </div>

    <nav class="site-nav" id="mainNav" aria-label="Primary navigation">
        <div class="container nav-inner">
            <a id="page-top-title" class="site-brand" href="#page-top" data-config-key="page-top-title">Feng Gu</a>
            <div class="nav-actions">
                <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch to dark mode"
                    aria-pressed="false"></button>
                <button class="site-toggler" type="button" aria-controls="navbarResponsive" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
            <div class="site-menu" id="navbarResponsive">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#page-top">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#publications">Publications</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#awards">Awards</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="top-section" style="background-image: url('static/assets/img/background.jpg');">
        <div class="container">
            <div class="hero-content reveal">
                <p class="hero-eyebrow" data-config-key="home-subtitle">Feng Gu&ensp;|&ensp;&#35895;&#23792;</p>
                <h1 id="top-section-bg-text" data-config-key="top-section-bg-text">Algebraic Combinatorics</h1>
                <div class="hero-rule" aria-hidden="true"></div>
            </div>
        </div>
    </header>

    <main>
        <section class="section-band section-home" id="home" data-section-name="home">
            <div class="container">
                <div class="profile-layout">
                    <div class="profile-copy reveal">
                        <div class="profile-head">
                            <header class="section-heading">
                                <span class="section-index">01</span>
                                <h2 id="home-subtitle" data-config-key="home-subtitle">Feng Gu&ensp;|&ensp;&#35895;&#23792;</h2>
                            </header>

                            <figure id="avatar" class="profile-portrait">
                                <img src="static/assets/img/avatar-360.jpg"
                                    srcset="static/assets/img/avatar-240.jpg 240w, static/assets/img/avatar-360.jpg 360w, static/assets/img/avatar-520.jpg 520w"
                                    sizes="(max-width: 480px) 104px, (max-width: 767px) 116px, (max-width: 991px) 180px, 300px"
                                    width="360" height="360" alt="Profile photo" loading="lazy" decoding="async" />
                            </figure>
                        </div>

                        <div class="main-body markdown-body" id="home-md"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="section-band section-band-muted" id="publications" data-section-name="publications">
            <div class="container">
                <header class="section-heading reveal">
                    <span class="section-index">02</span>
                    <h2 id="publications-subtitle">Publications</h2>
                </header>
                <div class="main-body markdown-body" id="publications-md"></div>
            </div>
        </section>

        <section class="section-band" id="awards" data-section-name="awards">
            <div class="container">
                <header class="section-heading reveal">
                    <span class="section-index">03</span>
                    <h2 id="awards-subtitle">Awards</h2>
                </header>
                <div class="main-body markdown-body" id="awards-md"></div>
            </div>
        </section>
    </main>

    <footer class="bg-bottom">
        <div class="container">
            <div class="footer-inner">
                <div id="copyright-text" class="copyright" data-config-key="copyright-text">&copy; Feng Gu 2026-2029. All Rights Reserved.</div>
                <div class="footer-links">
                    <a id="github-link" href="https://github.com/ldcr12138">Github</a>
                    <span aria-hidden="true">/</span>
                    <a id="license-link" href="https://github.com/ldcr12138/ldcr12138.github.io/blob/main/LICENSE">License</a>
                </div>
            </div>
        </div>
    </footer>

    <button class="back-to-top" id="back-to-top" type="button" aria-label="Back to top">&#8593;</button>
</body>

</html>
