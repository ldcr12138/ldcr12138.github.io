<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Academic Webpage" />
    <meta name="author" content="Feng Gu" />
    <title id="title"></title>

    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js" defer></script>
    <script type="text/javascript" src="static/js/marked.min.js" defer></script>
    <script type="text/javascript" src="static/js/js-yaml.min.js" defer></script>
    <script>
        MathJax = {
            tex: {
                packages: {},
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: false,
                processEnvironments: true,
                processRefs: true,
                tags: 'all',
                tagSide: 'right',
                tagIndent: '0.8em',
                useLabelIds: true,
                maxMacros: 10000,
                maxBuffer: 5 * 1024,
                formatError: (jax, err) => jax.formatError(err)
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" src="static/js/tex-svg.js" defer></script>
    <script type="text/javascript" src="static/js/scripts.js" defer></script>
</head>

<body id="page-top">
    <div class="site-progress" aria-hidden="true">
        <span id="scroll-progress"></span>
    </div>

    <nav class="site-nav navbar navbar-expand-lg fixed-top" id="mainNav" aria-label="Primary navigation">
        <div class="container px-4 px-lg-5">
            <a id="page-top-title" class="site-brand navbar-brand" href="#page-top" data-config-key="page-top-title"></a>
            <button class="navbar-toggler site-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false"
                aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#page-top">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#publications">Publications</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#awards">Awards</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="top-section" style="background-image: url('static/assets/img/background.jpg');">
        <div class="container px-4 px-lg-5">
            <div class="hero-content reveal">
                <p class="hero-eyebrow" data-config-key="home-subtitle"></p>
                <h1 id="top-section-bg-text" data-config-key="top-section-bg-text"></h1>
                <div class="hero-rule" aria-hidden="true"></div>
            </div>
        </div>
    </header>

    <main>
        <section class="section-band section-home" id="home" data-section-name="home">
            <div class="container px-4 px-lg-5">
                <div class="profile-layout">
                    <div class="profile-copy reveal">
                        <header class="section-heading">
                            <span class="section-index">01</span>
                            <h2 id="home-subtitle" data-config-key="home-subtitle"></h2>
                        </header>
                        <div class="main-body markdown-body" id="home-md"></div>
                    </div>

                    <figure id="avatar" class="profile-portrait reveal">
                        <img src="static/assets/img/photo.png" alt="Profile photo" />
                    </figure>
                </div>
            </div>
        </section>

        <section class="section-band section-band-muted" id="publications" data-section-name="publications">
            <div class="container px-4 px-lg-5">
                <header class="section-heading reveal">
                    <span class="section-index">02</span>
                    <h2 id="publications-subtitle">Publications</h2>
                </header>
                <div class="main-body markdown-body" id="publications-md"></div>
            </div>
        </section>

        <section class="section-band" id="awards" data-section-name="awards">
            <div class="container px-4 px-lg-5">
                <header class="section-heading reveal">
                    <span class="section-index">03</span>
                    <h2 id="awards-subtitle">Awards</h2>
                </header>
                <div class="main-body markdown-body" id="awards-md"></div>
            </div>
        </section>
    </main>

    <footer class="bg-bottom text-center py-5">
        <div class="container px-4 px-lg-5">
            <div class="footer-inner">
                <div id="copyright-text" class="copyright" data-config-key="copyright-text"></div>
                <div class="footer-links">
                    <a id="github-link" href="https://github.com/ldcr12138">Github</a>
                    <span aria-hidden="true">/</span>
                    <a id="license-link" href="https://github.com/ldcr12138/ldcr12138.github.io/blob/main/LICENSE">License</a>
                </div>
            </div>
        </div>
    </footer>

    <button class="back-to-top" id="back-to-top" type="button" aria-label="Back to top">↑</button>
</body>

</html>
